services:
  agent-wrenai:
    build:
      context: ./agent
    container_name: costaff-agent-wrenai
    restart: on-failure
    environment:
      - PORT=8081
      - PUBLIC_HOST=costaff-agent-wrenai
      - WORKSPACE_DIR=/app/data
      - SHARED_DIR=/app/data/shared
      - COSTAFF_SHARED_DIR_WRENAI=/app/data/shared/costaff-agent-wrenai
      - AGENT_WORKSPACE_DIR_WRENAI=/app/data
      - COSTAFF_AGENT_MODEL_PROVIDER=${COSTAFF_AGENT_MODEL_PROVIDER:-gemini}
      - WRENAI_AGENT_MODEL=${WRENAI_AGENT_MODEL:-gemini-3.1-flash-lite-preview}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME:-}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - WRENAI_BASE_URL=${WRENAI_BASE_URL}
      - WRENAI_PROJECT_ID=${WRENAI_PROJECT_ID}
      - WRENAI_MDL_HASH=${WRENAI_MDL_HASH}
      - WRENAI_TIMEOUT=${WRENAI_TIMEOUT:-30}
      - WRENAI_ASK_POLL_INTERVAL=${WRENAI_ASK_POLL_INTERVAL:-2}
      - WRENAI_ASK_POLL_TIMEOUT=${WRENAI_ASK_POLL_TIMEOUT:-120}
